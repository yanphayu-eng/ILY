<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>

<body class="w-100 vh-100 p-3" style="background-color: pink;">

    <div style="width: 300px;height: auto;" class="m-auto d-flex flex-column gap-3">
        <h3 style="color: palevioletred;" class="m-auto">DO YOU LOVE ME?</h3>
        <img src="gif1.gif" class="w-100 m-auto">
        <div class="main-btn w-100 d-flex gap-3 ">
            <a href="yes.html" class="btn btn-primary w-50" style="background-color: palevioletred;border: none;">YES</a>
            <button id="btn-no" class="btn btn-danger w-50">NO</button>
        </div>
    </div>

</body>

</html>
<script>
    const mybtn = document.getElementById("btn-no")
    mybtn.addEventListener("click",()=>{
        let w = Math.random()/5 * innerWidth;
        let h = Math.random()/5 * innerHeight;
        mybtn.style.position = "relative";
        mybtn.style.top = h + "px";
        mybtn.style.left = w + "px";
    })
</script>
